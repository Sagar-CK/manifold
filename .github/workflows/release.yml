name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-electron:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup runtime binaries
        run: pnpm setup:binaries

      - name: Package (electron-builder)
        run: pnpm dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: manifold-${{ matrix.os }}
          path: release/
          retention-days: 90

  publish-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-electron
    permissions:
      actions: read
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          assets=()
          while IFS= read -r -d '' asset; do
            assets+=("$asset")
          done < <(find release-artifacts -mindepth 2 -maxdepth 2 -type f \
            ! -name 'builder-debug.yml' \
            ! -name 'builder-effective-config.yaml' \
            -print0)

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found."
            exit 1
          fi

          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" \
              --title "Manifold ${GITHUB_REF_NAME}" \
              --notes "See the assets to download this version and install." \
              "${assets[@]}"
          fi
