services:
  qdrant:
    # Keep in sync with scripts/binaries-manifest.json (qdrantVersion)
    image: qdrant/qdrant:v1.17.1
    ports:
      - "6333:6333" # HTTP API and Web UI
      - "6334:6334" # gRPC API
    volumes:
      - ./qdrant_storage_dev:/qdrant/storage:z
    environment:
      - QDRANT__SERVICE__ENABLE_CORS=true
